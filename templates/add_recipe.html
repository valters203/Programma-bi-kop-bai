{% extends "base.html" %}

{% block title %}Add Recipe - Beekeeping Management{% endblock %}

{% block content %}
<h2>Add New Recipe</h2>
<form method="post">
    <div class="mb-3">
        <label for="name" class="form-label">Recipe Name</label>
        <input type="text" class="form-control" id="name" name="name" required>
    </div>
    <div class="mb-3">
        <label for="yield" class="form-label">Yield (how much product can be made)</label>
        <div class="input-group">
            <input type="number" step="0.01" class="form-control" id="yield" name="yield" value="1" required>
            <input type="text" class="form-control" id="yield_unit" name="yield_unit" placeholder="units" value="units">
        </div>
    </div>
    <button type="submit" class="btn btn-primary">Add Recipe</button>
    <a href="{{ url_for('recipes') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
