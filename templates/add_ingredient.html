{% extends "base.html" %}

{% block title %}Add Ingredient - Beekeeping Management{% endblock %}

{% block content %}
<div class="glass-panel p-4 mb-4">
<h2 class="section-title">Add Ingredient</h2>
<form method="post">
    <div class="mb-3">
        <label for="name" class="form-label">Ingredient Name</label>
        <input type="text" class="form-control" id="name" name="name" required>
    </div>
    <div class="mb-3">
        <label for="quantity" class="form-label">Quantity</label>
        <input type="number" step="0.01" class="form-control" id="quantity" name="quantity" required>
    </div>
    <div class="mb-3">
        <label for="unit" class="form-label">Unit</label>
        <input type="text" class="form-control" id="unit" name="unit" required>
    </div>
    <button type="submit" class="btn btn-honey">Add Ingredient</button>
    <a href="{{ url_for('view_recipe', recipe_id=recipe_id) }}" class="btn btn-soft">Cancel</a>
</form>
</div>
{% endblock %}
