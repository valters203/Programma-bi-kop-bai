{% extends "base.html" %}

{% block title %}Recipes - Beekeeping Management{% endblock %}

{% block content %}
<h2>Recipes</h2>
<a href="{{ url_for('add_recipe') }}" class="btn btn-primary mb-3">Add New Recipe</a>
<a href="{{ url_for('export_recipes') }}" class="btn btn-success mb-3">Export to Excel</a>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Name</th>
            <th>Yield</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for recipe in recipes %}
        <tr>
            <td><a href="{{ url_for('view_recipe', recipe_id=recipe[0]) }}">{{ recipe[1] }}</a></td>
            <td>{{ recipe[2] }} {{ recipe[3] }}</td>
            <td>
                <a href="{{ url_for('calculate_production', recipe_id=recipe[0]) }}" class="btn btn-sm btn-info">Calculate</a>
                <a href="{{ url_for('edit_recipe', id=recipe[0]) }}" class="btn btn-sm btn-warning">Edit</a>
                <a href="{{ url_for('delete_recipe', id=recipe[0]) }}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure?')">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
