{% extends "base.html" %}

{% block title %}Recipes - Beekeeping Management{% endblock %}

{% block content %}
<div class="glass-panel p-4 mb-4">
<h2 class="section-title">Recipes</h2>
<a href="{{ url_for('add_recipe') }}" class="btn btn-honey mb-3">Add New Recipe</a>
<a href="{{ url_for('export_recipes') }}" class="btn btn-honey mb-3">Export to Excel</a>
<div class="table-responsive"><table class="table table-dark table-striped table-hover align-middle mb-0">
    <thead>
        <tr>
            <th>Name</th>
            <th>Yield</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for recipe in recipes %}
        <tr>
            <td><a href="{{ url_for('view_recipe', recipe_id=recipe[0]) }}">{{ recipe[1] }}</a></td>
            <td>{{ recipe[2] }} {{ recipe[3] }}</td>
            <td>
                <a href="{{ url_for('calculate_production', recipe_id=recipe[0]) }}" class="btn-sm btn-soft">Calculate</a>
                <a href="{{ url_for('edit_recipe', id=recipe[0]) }}" class="btn-sm btn-secondary">Edit</a>
                <a href="{{ url_for('delete_recipe', id=recipe[0]) }}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure?')">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table></div>
</div>
{% endblock %}
