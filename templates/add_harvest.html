{% extends "base.html" %}

{% block title %}Add Harvest - Beekeeping Management{% endblock %}

{% block content %}
<h2>Add New Harvest</h2>
<form method="post">
    <div class="mb-3">
        <label for="date" class="form-label">Date</label>
        <input type="date" class="form-control" id="date" name="date" value="{{ current_date }}" required>
    </div>
    <div class="mb-3">
        <label for="honey_type" class="form-label">Honey Type</label>
        <input type="text" class="form-control" id="honey_type" name="honey_type" required>
    </div>
    <div class="mb-3">
        <label for="amount" class="form-label">Amount (kg)</label>
        <input type="number" step="0.01" class="form-control" id="amount" name="amount" required>
    </div>
    <div class="mb-3">
        <label for="money_earned" class="form-label">Money Earned</label>
        <input type="number" step="0.01" class="form-control" id="money_earned" name="money_earned">
    </div>
    <button type="submit" class="btn btn-primary">Add Harvest</button>
    <a href="{{ url_for('harvests') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
